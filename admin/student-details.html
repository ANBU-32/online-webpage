<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>

    <link rel="stylesheet" href="css/student-details.css">
</head>
<body>

    <h1>Student Details</h1>

    <table border="1" cellpadding="10">

        <tr>
            <th>Full Name</th>
            <td id="full_name"></td>
        </tr>

        <tr>
            <th>Mobile</th>
            <td id="mobile"></td>
        </tr>

        <tr>
            <th>Email</th>
            <td id="email"></td>
        </tr>

        <tr>
            <th>State</th>
            <td id="state"></td>
        </tr>

        <tr>
            <th>NEET Qualified</th>
            <td id="neet"></td>
        </tr>

        <tr>
            <th>NEET Score</th>
            <td id="score"></td>
        </tr>

    </table>

    <br>

    <button id="editBtn">Edit Student</button>

    <a href="dashboard.html">← Back to Dashboard</a>

    <script src="js/student-details.js"></script>

</body>
</html>
