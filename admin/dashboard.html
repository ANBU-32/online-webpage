<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBBS-IUK Admin Dashboard</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>MBBS-IUK</h2>

        <ul>
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="dashboard.html">👨‍🎓 Students</a></li>
           <li> <a href="#" id="logoutBtn">🚪 Logout</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="content">

        <header>
            <h1>Admin Dashboard</h1>
        </header>

        <div class="cards">

            <div class="card">
                <h3>Total Students</h3>
                <h2 id="totalStudents">0</h2>
            </div>

        </div>

        <div class="table-container">

            <h2>Student List</h2>

            <div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="Search by name, mobile or email..."
    >
</div>

            <table>

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </div>

    </main>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
