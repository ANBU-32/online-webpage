<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBBS-IUK Admin Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        <h2>Admin Login</h2>

        <form id="loginForm">
            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

            <p id="message"></p>
        </form>
    </div>

    <script src="js/login.js"></script>

</body>
</html>
